<svg width="1600" height="980" viewBox="0 0 1600 980" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1600" y2="980" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F8FAFC"/>
      <stop offset="1" stop-color="#E2E8F0"/>
    </linearGradient>
    <linearGradient id="primary" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#2563EB"/>
      <stop offset="1" stop-color="#1D4ED8"/>
    </linearGradient>
    <linearGradient id="good" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#22C55E"/>
      <stop offset="1" stop-color="#16A34A"/>
    </linearGradient>
    <linearGradient id="warn" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#F59E0B"/>
      <stop offset="1" stop-color="#D97706"/>
    </linearGradient>
    <linearGradient id="bad" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#EF4444"/>
      <stop offset="1" stop-color="#DC2626"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#0F172A" flood-opacity="0.10"/>
    </filter>
  </defs>

  <rect width="1600" height="980" fill="url(#bg)"/>
  <text x="80" y="96" fill="#0F172A" font-family="Segoe UI, Arial, sans-serif" font-size="42" font-weight="700">Hot Swapper Overview</text>
  <text x="80" y="136" fill="#475569" font-family="Segoe UI, Arial, sans-serif" font-size="22">Sticky failover flow for Hermes and OpenRouter-style model pools</text>

  <rect x="80" y="190" width="280" height="110" rx="24" fill="url(#primary)" filter="url(#shadow)"/>
  <text x="120" y="238" fill="white" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="700">1. Agent Request</text>
  <text x="120" y="274" fill="#DBEAFE" font-family="Segoe UI, Arial, sans-serif" font-size="20">Task enters Hot Swapper</text>

  <rect x="430" y="190" width="320" height="110" rx="24" fill="#FFFFFF" stroke="#CBD5E1" filter="url(#shadow)"/>
  <text x="468" y="238" fill="#0F172A" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="700">2. Load Pool + Config</text>
  <text x="468" y="274" fill="#475569" font-family="Segoe UI, Arial, sans-serif" font-size="20">auth.json + model cycle</text>

  <rect x="820" y="190" width="320" height="110" rx="24" fill="#FFFFFF" stroke="#CBD5E1" filter="url(#shadow)"/>
  <text x="856" y="238" fill="#0F172A" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="700">3. Pick Best Slot</text>
  <text x="856" y="274" fill="#475569" font-family="Segoe UI, Arial, sans-serif" font-size="20">highest-priority healthy slot</text>

  <rect x="1210" y="190" width="310" height="110" rx="24" fill="#FFFFFF" stroke="#CBD5E1" filter="url(#shadow)"/>
  <text x="1248" y="238" fill="#0F172A" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="700">4. Send Request</text>
  <text x="1248" y="274" fill="#475569" font-family="Segoe UI, Arial, sans-serif" font-size="20">OpenRouter or compatible API</text>

  <path d="M360 245H430" stroke="#2563EB" stroke-width="6" stroke-linecap="round"/>
  <path d="M750 245H820" stroke="#2563EB" stroke-width="6" stroke-linecap="round"/>
  <path d="M1140 245H1210" stroke="#2563EB" stroke-width="6" stroke-linecap="round"/>

  <rect x="555" y="378" width="490" height="134" rx="28" fill="#FFFFFF" stroke="#94A3B8" filter="url(#shadow)"/>
  <text x="707" y="430" fill="#0F172A" font-family="Segoe UI, Arial, sans-serif" font-size="30" font-weight="700">Did the model respond?</text>
  <text x="632" y="468" fill="#64748B" font-family="Segoe UI, Arial, sans-serif" font-size="22">success, timeout, 429, 401, 5xx, or empty reply</text>

  <path d="M1365 300V356H800" stroke="#64748B" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M800 346L780 356L800 366" fill="none" stroke="#64748B" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>

  <rect x="120" y="610" width="360" height="130" rx="26" fill="url(#good)" filter="url(#shadow)"/>
  <text x="166" y="660" fill="white" font-family="Segoe UI, Arial, sans-serif" font-size="30" font-weight="700">Success Path</text>
  <text x="166" y="700" fill="#DCFCE7" font-family="Segoe UI, Arial, sans-serif" font-size="21">Return response to the agent</text>

  <rect x="620" y="610" width="360" height="130" rx="26" fill="url(#warn)" filter="url(#shadow)"/>
  <text x="666" y="660" fill="white" font-family="Segoe UI, Arial, sans-serif" font-size="30" font-weight="700">Fallback Path</text>
  <text x="666" y="700" fill="#FEF3C7" font-family="Segoe UI, Arial, sans-serif" font-size="21">Mark degraded or cooldown and try next slot</text>

  <rect x="1120" y="610" width="360" height="130" rx="26" fill="url(#bad)" filter="url(#shadow)"/>
  <text x="1166" y="660" fill="white" font-family="Segoe UI, Arial, sans-serif" font-size="30" font-weight="700">Dead Key Path</text>
  <text x="1166" y="700" fill="#FEE2E2" font-family="Segoe UI, Arial, sans-serif" font-size="21">401 marks key as dead and removes it</text>

  <path d="M680 512V582H300" stroke="#16A34A" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M920 512V582H800" stroke="#D97706" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M1020 512V582H1300" stroke="#DC2626" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>

  <text x="608" y="560" fill="#16A34A" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="700">200 OK</text>
  <text x="822" y="560" fill="#D97706" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="700">429 / timeout / 5xx / empty</text>
  <text x="1104" y="560" fill="#DC2626" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="700">401</text>

  <rect x="80" y="814" width="1440" height="110" rx="28" fill="#0F172A"/>
  <text x="126" y="860" fill="#F8FAFC" font-family="Segoe UI, Arial, sans-serif" font-size="30" font-weight="700">Sticky outcome:</text>
  <text x="364" y="860" fill="#BFDBFE" font-family="Segoe UI, Arial, sans-serif" font-size="24">if a fallback slot succeeds, Hot Swapper can promote it to priority 0, rewrite auth.json,</text>
  <text x="364" y="895" fill="#BFDBFE" font-family="Segoe UI, Arial, sans-serif" font-size="24">and update config.yaml so the next run starts from the working model instead of retrying the broken default.</text>
</svg>
